<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 560px; margin: 24px auto; background: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #e4e4e7; }
    .header { background-color: #6366f1; padding: 20px 24px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 18px; font-weight: 600; }
    .body { padding: 24px; }
    .body h2 { margin: 0 0 12px; font-size: 16px; color: #18181b; }
    .body p { margin: 0 0 16px; font-size: 14px; color: #3f3f46; line-height: 1.6; }
    .btn { display: inline-block; padding: 10px 20px; background-color: #6366f1; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 500; }
    .footer { padding: 16px 24px; background-color: #fafafa; border-top: 1px solid #e4e4e7; }
    .footer p { margin: 0; font-size: 12px; color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TaskFlow</h1>
    </div>
    <div class="body">
      <h2>{{ title }}</h2>
      {% if body %}<p>{{ body }}</p>{% endif %}
      {% if frontend_url %}
      <p>
        <a href="{{ frontend_url }}" class="btn">前往 TaskFlow</a>
      </p>
      {% endif %}
    </div>
    <div class="footer">
      <p>此為系統自動發送的通知信件，請勿直接回覆。</p>
    </div>
  </div>
</body>
</html>
