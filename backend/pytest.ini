[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# coverage 細項（branch / omit / exclude_lines）由 pyproject.toml 提供
addopts =
    --reuse-db
    --cov=apps
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=85
